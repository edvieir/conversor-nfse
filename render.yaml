services:
  - type: web
    name: conversor-nfse
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false --server.fileWatcherType none
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      # Variável para garantir o admin após cada redeploy (filesystem efêmero)
      # Formato: ADMIN_BOOTSTRAP=login:senha
      # Defina isso nas Environment Variables do painel do Render
      # - key: ADMIN_BOOTSTRAP
      #   value: admin:suasenha
